default:
  image: node:22

stages:
  - test
  - integration
  - quality

# ── shared setup ──────────────────────────────────────────────────────────────

.pnpm-setup: &pnpm-setup
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile

# ── unit tests + lcov coverage (always, all branches) ────────────────────────

unit-test:
  stage: test
  <<: *pnpm-setup
  script:
    - pnpm test:coverage
  coverage: '/All files\s*\|\s*([\d.]+)/'
  artifacts:
    paths:
      - coverage/lcov.info
    expire_in: 1 day

# ── sonar scan (master only) ──────────────────────────────────────────────────

sonar:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
  dependencies:
    - unit-test
  script:
    - sonar-scanner
        -Dsonar.host.url=$SONAR_HOST_URL
        -Dsonar.token=$SONAR_TOKEN
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

# ── smoke test (demo API, master only) ───────────────────────────────────────

smoke-test:
  stage: integration
  <<: *pnpm-setup
  variables:
    OKX_DEMO: "1"
  script:
    - node --import tsx/esm scripts/smoke-test/run.ts --read-only
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  allow_failure: false
